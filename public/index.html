<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPANION BRAIN</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface-2: #1a1a26;
    --border: #2a2a3a;
    --text: #e4e4ed;
    --text-muted: #8888a0;
    --accent: #6c5ce7;
    --accent-glow: rgba(108, 92, 231, 0.15);
    --user-bg: #1e1e30;
    --brain-bg: #161622;
    --green: #00d2a0;
    --red: #ff5252;
    --radius: 12px;
    --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Login overlay */
  .login-overlay {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
  }
  .login-overlay.hidden { display: none; }
  .login-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px 32px;
    width: 340px;
    text-align: center;
  }
  .login-box .icon { font-size: 40px; margin-bottom: 16px; }
  .login-box h2 { font-size: 18px; font-weight: 600; margin-bottom: 6px; }
  .login-box p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; }
  .login-box input {
    width: 100%; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); font-family: var(--font); font-size: 14px;
    padding: 12px 16px; outline: none; margin-bottom: 12px;
    transition: border-color 0.2s; text-align: center; letter-spacing: 0.05em;
  }
  .login-box input:focus { border-color: var(--accent); }
  .login-box input::placeholder { color: var(--text-muted); letter-spacing: normal; }
  .login-box button {
    width: 100%; background: var(--accent); border: none;
    border-radius: var(--radius); color: #fff; font-family: var(--font);
    font-size: 14px; font-weight: 500; padding: 12px; cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-box button:hover { opacity: 0.9; }
  .login-error { color: var(--red); font-size: 12px; margin-top: 8px; display: none; }

  /* Header */
  .header {
    display: flex; align-items: center; gap: 12px;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    background: var(--surface); flex-shrink: 0;
  }
  .header-icon {
    width: 40px; height: 40px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), #a855f7);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .header-info h1 { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  .header-info .status { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .status-dot.offline { background: var(--red); animation: none; }

  /* Messages */
  .messages {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg {
    max-width: 85%; padding: 12px 16px; border-radius: var(--radius);
    font-size: 14px; line-height: 1.6; white-space: pre-wrap;
    word-break: break-word; animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; background: var(--user-bg); border: 1px solid var(--border); border-bottom-right-radius: 4px; }
  .msg.brain { align-self: flex-start; background: var(--brain-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .msg.brain .label { font-size: 11px; color: var(--accent); font-weight: 600; margin-bottom: 4px; letter-spacing: 0.05em; text-transform: uppercase; }
  .msg.brain strong { color: #fff; font-weight: 600; }
  .msg.system { align-self: center; background: transparent; color: var(--text-muted); font-size: 12px; text-align: center; padding: 8px; }
  .typing { display: flex; gap: 5px; padding: 12px 16px; }
  .typing span { width: 8px; height: 8px; border-radius: 50%; background: var(--text-muted); animation: bounce 1.4s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-8px); } }

  /* Input */
  .input-area { padding: 16px 20px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
  .input-row { display: flex; gap: 10px; align-items: flex-end; }
  .input-row textarea {
    flex: 1; background: var(--surface-2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text); font-family: var(--font);
    font-size: 14px; padding: 12px 16px; resize: none; outline: none;
    min-height: 44px; max-height: 140px; transition: border-color 0.2s; line-height: 1.5;
  }
  .input-row textarea:focus { border-color: var(--accent); }
  .input-row textarea::placeholder { color: var(--text-muted); }
  .send-btn {
    width: 44px; height: 44px; border-radius: var(--radius);
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.2s, transform 0.1s;
  }
  .send-btn:hover { opacity: 0.9; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .send-btn svg { width: 20px; height: 20px; fill: #fff; }
  .footer-hint { font-size: 11px; color: var(--text-muted); text-align: center; margin-top: 8px; }
  .footer-hint a { color: var(--text-muted); text-decoration: none; }

  /* Quick actions */
  .quick-actions { display: flex; gap: 8px; flex-wrap: wrap; padding: 0 20px 12px; }
  .quick-btn {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 20px; color: var(--text-muted); font-size: 12px;
    padding: 6px 14px; cursor: pointer; font-family: var(--font); transition: all 0.2s;
  }
  .quick-btn:hover { border-color: var(--accent); color: var(--text); }

  @media (max-width: 600px) {
    .msg { max-width: 92%; }
    .header { padding: 12px 16px; }
    .messages { padding: 16px; }
    .input-area { padding: 12px 16px; }
    .quick-actions { padding: 0 16px 8px; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="icon">🧠</div>
    <h2>COMPANION BRAIN</h2>
    <p>Inserisci il token di accesso</p>
    <input type="password" id="tokenInput" placeholder="Token" autocomplete="off">
    <button id="loginBtn">Accedi</button>
    <div class="login-error" id="loginError">Token non valido</div>
  </div>
</div>

<div class="header">
  <div class="header-icon">🧠</div>
  <div class="header-info">
    <h1>COMPANION BRAIN</h1>
    <div class="status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Online</span>
    </div>
  </div>
</div>

<div class="messages" id="messages">
  <div class="msg system">Connesso a COMPANION BRAIN — Martello1930</div>
</div>

<div class="quick-actions" id="quickActions">
  <button class="quick-btn" data-msg="Dammi lo status report completo">📊 Status</button>
  <button class="quick-btn" data-msg="Top 5 urgenze reali">🔴 Urgenze</button>
  <button class="quick-btn" data-msg="Quanti task attivi ho? Riassumi per priorità">📋 Task</button>
  <button class="quick-btn" data-msg="Errori workflow nelle ultime 24h">⚠️ Errori</button>
  <button class="quick-btn" data-msg="Come sta il sistema? Health check completo">💚 Health</button>
</div>

<div class="input-area">
  <div class="input-row">
    <textarea id="input" placeholder="Scrivi un messaggio al BRAIN..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" title="Invia">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="footer-hint">
    <a href="https://www.perplexity.ai/computer" target="_blank" rel="noopener">Created with Perplexity Computer</a>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const messagesEl = $('messages');
const inputEl = $('input');
const sendBtn = $('sendBtn');
const statusDot = $('statusDot');
const statusText = $('statusText');
const quickActions = $('quickActions');
const loginOverlay = $('loginOverlay');
const tokenInput = $('tokenInput');
const loginBtn = $('loginBtn');
const loginError = $('loginError');

const SESSION_ID = 'brain_web_' + Math.random().toString(36).slice(2, 10);
let isLoading = false;
let authToken = localStorage.getItem('brain_token') || '';

// --- Auth ---
function checkAuth() {
  if (authToken) {
    loginOverlay.classList.add('hidden');
    inputEl.focus();
  } else {
    loginOverlay.classList.remove('hidden');
    tokenInput.focus();
  }
}

async function tryLogin() {
  const token = tokenInput.value.trim();
  if (!token) return;
  loginBtn.disabled = true;
  loginBtn.textContent = 'Verifica...';
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-auth-token': token },
      body: JSON.stringify({ message: 'ping', sessionId: 'auth_check' })
    });
    if (res.ok) {
      authToken = token;
      localStorage.setItem('brain_token', token);
      loginOverlay.classList.add('hidden');
      loginError.style.display = 'none';
      setStatus(true);
      inputEl.focus();
    } else {
      loginError.style.display = 'block';
    }
  } catch (e) {
    loginError.style.display = 'block';
  }
  loginBtn.disabled = false;
  loginBtn.textContent = 'Accedi';
}

loginBtn.addEventListener('click', tryLogin);
tokenInput.addEventListener('keydown', e => { if (e.key === 'Enter') tryLogin(); });

// --- UI helpers ---
function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  if (type === 'brain') {
    const label = document.createElement('div');
    label.className = 'label';
    label.textContent = 'BRAIN';
    div.appendChild(label);
    const content = document.createElement('div');
    content.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
    div.appendChild(content);
  } else {
    div.textContent = text;
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg brain'; div.id = 'typing';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideTyping() { const el = $('typing'); if (el) el.remove(); }

function setStatus(online) {
  statusDot.className = 'status-dot' + (online ? '' : ' offline');
  statusText.textContent = online ? 'Online' : 'Offline';
}

// --- Chat ---
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';
  quickActions.style.display = 'none';

  addMessage(text, 'user');
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-auth-token': authToken },
      body: JSON.stringify({ message: text, sessionId: SESSION_ID })
    });
    hideTyping();

    if (res.status === 401) {
      authToken = '';
      localStorage.removeItem('brain_token');
      addMessage('Sessione scaduta. Ricarica la pagina.', 'system');
      checkAuth();
    } else if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      addMessage('Errore: ' + (err.error || res.statusText), 'system');
      setStatus(false);
    } else {
      const data = await res.json();
      addMessage(data.output, 'brain');
      setStatus(true);
    }
  } catch (err) {
    hideTyping();
    addMessage('Connessione persa: ' + err.message, 'system');
    setStatus(false);
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

// --- Auto-resize ---
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

// --- Event listeners ---
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
sendBtn.addEventListener('click', sendMessage);
quickActions.addEventListener('click', e => {
  const btn = e.target.closest('.quick-btn');
  if (btn && !isLoading) { inputEl.value = btn.dataset.msg; sendMessage(); }
});

// --- Init ---
fetch('/api/health').then(r => r.ok ? setStatus(true) : setStatus(false)).catch(() => setStatus(false));
checkAuth();
</script>
</body>
</html>
